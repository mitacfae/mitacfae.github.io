<aside class="sidebar" aria-label="Categories">
  <div class="sidebar-card">
    <div class="sidebar-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      Categories
    </div>
    <ul class="cat-list">
      {% for category in site.sidebar_categories %}
      <li>
        <a class="cat-item" href="{{ category.url }}">
          <span class="cat-label">{{ category.name }}</span>
          {% assign count = site.posts | where_exp: "post", "post.categories contains category.name" | size %}
          <span class="cat-count">{{ count }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</aside>
