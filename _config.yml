# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: MyTech Notes
email: mitacfae995@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
twitter_username: username
github_username: mitacfae
minimal_mistakes_skin: default
search: true

# Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-QKTN538X44"
    anonymize_ip: false # true, false (default)

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Andy"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "To pass it by is to lose it evermore; record it well, lest memory fail thee."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "/"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/andy-yang-0209b2b6"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/TehsunY"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mitacfae/"
 #   - label: "Instagram"
 #     icon: "fab fa-fw fa-instagram"
 #     url: "https://instagram.com/"

widgets:
  - position: left
    widgets:
      - type: profile
        # ... 原本的 profile 設定 (內含 twitter, github 等)
      - type: html
        title: 訪客統計
        content: '<div style="text-align:center;"><a href="https://www.websiteout.net"><img src="https://www.websiteout.net/map.php?c=XXXXXX" border="0"></a></div>'
 

footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/"
 #   - label: "Instagram"
 #     icon: "fab fa-fw fa-instagram"
 #     url: "https://instagram.com/"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      toc: true          #Table of Contents: enable
      toc_sticky: true   #Whole Web enable TOC 
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
# add Comment in Web Page
comments:
  provider: "custom"
