defaults:
  # _posts（含 en/zh-tw/zh-hans/ja/ko 子資料夾，全部都屬於同一個 posts collection）
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      toc: true          #Table of Contents: enable
      toc_sticky: true   #Whole Web enable TOC
      lang: en           # 根目錄文章預設視為英文
  # 語系子資料夾：自動套用語系前綴的 permalink，避免與英文版網址撞車
  # 注意：資料夾名稱請與實際的 _posts 子資料夾名稱完全一致
  - scope:
      path: "_posts/zh-tw"
      type: posts
    values:
      permalink: /zh/:categories/:title/
      lang: zh-tw
  - scope:
      path: "_posts/zh-hans"
      type: posts
    values:
      permalink: /zh-hans/:categories/:title/
      lang: zh-hans
  - scope:
      path: "_posts/ja"
      type: posts
    values:
      permalink: /ja/:categories/:title/
      lang: ja
  - scope:
      path: "_posts/ko"
      type: posts
    values:
      permalink: /ko/:categories/:title/
      lang: ko
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
 
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
# add Comment in Web Page
comments:
  provider: "custom"
 
